name: Security Gateway

on:
  push:
    branches: [ main, develop, release/* ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
  schedule:
    # Run daily at 00:00 UTC to catch new CVEs
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Run all security tests
  security-tests:
    name: Adversarial Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "security-${{ runner.os }}"
          cache-on-failure: false
      
      - name: Initialize V8
        run: |
          # V8 is bundled with rusty_v8, no separate installation needed
          echo "V8 initialized via rusty_v8"
      
      - name: Run security tests
        run: |
          echo "Running adversarial security test suite..."
          # pipefail: tee must not mask cargo test's exit status
          set -o pipefail
          cargo test --test security_adversarial -- --test-threads=1 --nocapture 2>&1 | tee security-test-results.txt
        timeout-minutes: 25

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: security-test-results.txt
          retention-days: 30

      - name: Check test results
        # Gate on the harness's actual verdict line, not on incidental words:
        # the old `grep "FAILED\|error\|panic"` false-positived on fully
        # passing runs (any test or compiler output containing "error").
        run: |
          if grep -qE "^test result: FAILED" security-test-results.txt; then
            echo "❌ Security tests failed"
            exit 1
          elif grep -qE "^test result: ok" security-test-results.txt; then
            echo "✅ All security tests passed"
          else
            echo "❌ No test verdict found in output — treating as failure"
            exit 1
          fi

  # CVE scanning for dependencies
  cve-scan:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cve-${{ runner.os }}"
          cache-on-failure: false
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # (cargo-audit fetches/updates the advisory database automatically on
      # each run; the old `cargo audit --update` flag was removed upstream.)
      - name: Run CVE scan
        run: |
          echo "Running CVE scan on dependencies..."
          # Run with --deny warnings to fail on any CVE
          cargo audit --deny warnings 2>&1 | tee cve-scan-results.txt
        continue-on-error: false
      
      - name: Upload CVE scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cve-scan-results
          path: cve-scan-results.txt
          retention-days: 30
      
      - name: Check CVE results
        run: |
          if grep -q "error\|vulnerable" cve-scan-results.txt; then
            echo "❌ CVE scan found issues"
            exit 1
          else
            echo "✅ No CVEs found"
          fi

  # License and security policy enforcement
  cargo-deny:
    name: License & Security Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses
          arguments: --all-features
      
      - name: Check bans
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans
          arguments: --all-features

  # Full in-repo test suite — manual dispatches only.
  #
  # Push/PR/schedule runs are unaffected (this job is skipped). On a manual
  # dispatch, the entire cargo test suite (lib + every tests/*.rs) runs on
  # the dispatched ref, so feature branches can get full-suite verification
  # on a real linked V8 build before merging. Not part of the security gate.
  full-tests:
    name: Full Test Suite (dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "security-${{ runner.os }}"
          cache-on-failure: false

      - name: Run full test suite
        # --lib --tests: all unit + integration tests; benches excluded.
        # --no-fail-fast: report every failing binary in one run instead of
        # stopping at the first, so a single dispatch gives the full picture.
        run: cargo test --lib --tests --no-fail-fast
        timeout-minutes: 40

  # Security linting
  security-lint:
    name: Security Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run Clippy (security warnings as errors)
        run: |
          cargo clippy --all-targets --all-features -- -W clippy::all -W clippy::cargo -W clippy::nursery \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -W clippy::panic \
            -A clippy::deprecated \
            2>&1 | tee clippy-results.txt
        continue-on-error: true
      
      - name: Check for security-sensitive lints
        run: |
          # Check for unwrap/expect usage in non-test code
          if grep -E "(\.unwrap\(\)|\.expect\([^)]+\))" src/**/*.rs 2>/dev/null | grep -v "//"; then
            echo "⚠️ Found unwrap/expect usage in source code - review recommended"
            # Don't fail the build, just warn
          fi
          
          echo "Linting complete"

  # Summary job
  security-gate:
    name: Security Gate
    needs: [security-tests, cve-scan, cargo-deny, security-lint]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check security gate status
        run: |
          echo "Security Gate Summary"
          echo "===================="
          echo "Security Tests: ${{ needs.security-tests.result }}"
          echo "CVE Scan: ${{ needs.cve-scan.result }}"
          echo "Cargo Deny: ${{ needs.cargo-deny.result }}"
          echo "Security Lint: ${{ needs.security-lint.result }}"
          echo ""
          
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "❌ Security tests failed"
            exit 1
          fi
          
          if [ "${{ needs.cve-scan.result }}" != "success" ]; then
            echo "❌ CVE scan failed"
            exit 1
          fi
          
          if [ "${{ needs.cargo-deny.result }}" != "success" ]; then
            echo "❌ License/security policy check failed"
            exit 1
          fi
          
          echo "✅ Security gate passed - all checks successful"
