# Manually-dispatched full test suite.
#
# Unlike test-suite.yml (external test-suite repo, main-branch pushes only)
# and security.yml (security_adversarial only), this runs the ENTIRE
# in-repo cargo test suite — every tests/*.rs plus lib unit tests — on any
# branch, on demand. It exists so feature branches can get full-suite
# verification on a real linked V8 build before merging, without touching
# the push-triggered pipelines.
#
# Trigger: gh workflow run branch-full-tests.yml --ref <branch>
# (or the Actions API workflow_dispatch endpoint with the branch as ref).

name: Full Test Suite (manual)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  full-tests:
    name: cargo test (lib + all integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Shares the security workflow's cache so a dispatch right after a
          # Security Gateway run reuses its dependency build.
          shared-key: "security-${{ runner.os }}"
          cache-on-failure: false

      - name: Run full test suite
        # --lib --tests: all unit + integration tests; excludes benches
        # (benches are compile-gated separately and not part of the gate).
        run: cargo test --lib --tests
        timeout-minutes: 40
