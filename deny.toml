# Cargo Deny Configuration
# 
# This configuration enforces security policies for dependencies.
# Run with: cargo deny check

[graph]
# Include dev dependencies in checks
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
# Advisory database configuration
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Check for yanked crates
yanked = "warn"

# Ignore specific advisories (with justification)
# ignore = [
#     { id = "RUSTSEC-2021-0123", reason = "Not exploitable in NANO context: <justification>" },
# ]

[licenses]
# Whitelist of allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "OpenSSL",
    "MPL-2.0",
]

# List of explicitly denied licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

# Licenses that require explicit approval
copyleft = "deny"

# Confidence threshold for license detection
confidence-threshold = 0.8

[licenses.private]
# Ignore private workspace crates
ignore = false
registries = []

[bans]
# Banned crate versions (security or policy reasons)
# Multiple versions of the same crate
multiple-versions = "warn"

# Wildcard dependencies not allowed
wildcards = "warn"

# Highlight specific crate duplication
# highlight = "all"

# Skip certain duplicate versions (temporary exceptions)
skip = [
    # { name = "crate-name", version = "=0.1.0" },
]

skip-tree = [
    # { name = "crate-name", version = "=0.1.0", depth = 2 },
]

[sources]
# Allowed crate registries
allowed-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

# Allow crates from specific git repositories
# allowed-git = [
#     "https://github.com/owner/repo",
# ]

[sources.allow-org]
# Allow crates from specific GitHub organizations
# github = ["your-org"]
# gitlab = ["your-org"]
# bitbucket = ["your-org"]
